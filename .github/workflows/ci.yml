name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Stub required env vars so Next.js / Fastify don't crash at build time
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          AUTH0_SECRET: ci-secret-placeholder-32-chars-ok
          APP_BASE_URL: http://localhost:3000
          AUTH0_DOMAIN: example.auth0.com
          AUTH0_AUDIENCE: https://api.housepoints.example
          AUTH0_CLIENT_ID: ci-client-id
          AUTH0_CLIENT_SECRET: ci-client-secret
