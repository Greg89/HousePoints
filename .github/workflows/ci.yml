name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: housepoints_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d housepoints_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - name: Deploy test database migrations
        run: npm run db:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/housepoints_ci

      - name: Database integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/housepoints_ci
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          # Stub required env vars so Next.js / Fastify don't crash at build time
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          AUTH0_SECRET: ci-secret-placeholder-32-chars-ok
          APP_BASE_URL: http://localhost:3000
          AUTH0_DOMAIN: example.auth0.com
          AUTH0_AUDIENCE: https://api.housepoints.example
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          AUTH0_CLIENT_ID: ci-client-id
          AUTH0_CLIENT_SECRET: ci-client-secret
